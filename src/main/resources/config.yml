# # # # # # # # # # # # # # # # #
#  SimpleGraves  Configuration  #
#         By  PixelCatt         #
# # # # # # # # # # # # # # # # #

# Allow breaking other Player's Graves (Default: true)
# Must be true or false
grave-stealing: true

# Maximum Amount of XP-Levels that will be stord in Graves (Default: 25)
# Must be a Number 0 or higher
max-stored-xp: 25

# Remove Items with Curse of Vanishing on Death (Default: false)
# Must be true or false
delete-vanishing-items: false

# Protect Player Heads that aren't a Grave from being destroyed by Water (Default: true)
# Recommended to ENABLE this for BIG Performance Improvements
# Must be true or false
non-grave-player-head-water-protection: true

# Custom Name for the Grave Block (Default: "%player%'s Grave")
# Use %player% as a placeholder for the Player Name
grave-block-name: "%player%'s Grave"

# Grave Highlight Settings
# When enabled, a player's grave will glow when they are nearby.
grave-highlight:
  enabled: true
  # Range in blocks to detect the player (Default: 10)
  range: 10


# Database Settings
# Supported database types: sqlite, postgresql
# Default: sqlite
database-type: sqlite

# PostgreSQL Connection Settings
# Only used when database-type is set to 'postgresql'
postgresql:
  host: localhost
  port: 5432
  database: simplegraves
  username: simplegraves
  password: ""
  pool-settings:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout: 5000


# The Config Version
# Do not change this Value
config-version: ${project.version}


# # # # # # # # # # # # # # # # #
#       Message Configuration    #
#   Translate to your Language   #
# # # # # # # # # # # # # # # # #
#
# All messages sent to Players can be customized below.
# Use %placeholder% for dynamic values.
# Color codes with § are supported.
# For JSON/tellraw messages, use valid JSON format.
#
# Available placeholders:
#   %number%    - Grave number
#   %player%    - Player name
#   %world%     - World name (display name)
#   %world_json% - World name (JSON component)
#   %coords%    - X, Y, Z coordinates
#   %x%, %y%, %z% - Individual coordinates
#   %name%      - Generic name (for custom world names)
#
messages:
  # ----- Death Messages -----
  death:
    # When no safe location is found at death point,
    # and the grave will be placed at respawn point instead.
    lucky_day: "§aIt's your Lucky Day!"
    no_safe_location: "§cSimpleGraves was unable to place your Grave!"
    keep_items: "§aBecause of this, you can keep your Items!"
    grave_at_respawn: "§aYour grave will be placed at your respawn point!"

  # ----- Grave Creation Messages -----
  grave:
    failed_create: "§cFailed to create Grave!"

    # Tellraw JSON sent when a grave is placed.
    # Available placeholders: %number%, %coords%, %world_json%
    location_tellraw: '[{"text":"Your Grave ","color":"white"},{"text":"#%number%","color":"gold"},{"text":" is Located at ","color":"white"},{"text":"%coords%","color":"gold"},{"text":" in ","color":"white"},%world_json%]'

    # JSON components for world names (used in location_tellraw)
    world_overworld: '{"text":"The Overworld","color":"green"}'
    world_nether: '{"text":"The Nether","color":"red"}'
    world_end: '{"text":"The End","color":"#ffffaa"}'
    # For custom worlds, %name% will be replaced with the world name
    world_custom: '{"text":"%name%","color":"light_purple"}'

  # ----- Block Break Messages -----
  block_break:
    cannot_break_others: "§cYou cannot break other Player's Graves!"

  # ----- Command Messages -----
  cmd:
    player_only: "§cOnly Players can run this Command!"
    no_permission: "§cYou don't have permission to use this command."
    usage_graveinfo: "Usage: /graveinfo <number>"
    usage_graveitems: "Usage: /graveitems <number>"
    usage_graveadmin: "Usage: /graveadmin <go|list|info|items|remove> [<player>] [<number>]"
    grave_must_be_number: "§cGrave must be a Number."
    no_grave_with_number: "§cYou don't have a Grave with Number #%number%"
    failed_grave_location: "§cFailed to retrieve the Grave Location"
    grave_info: "§aGrave #%number% is Located at:\n§9World: §c%world%\n§9X: §c%x%\n§9Y: §c%y%\n§9Z: §c%z%"
    grave_no_items: "§cGrave #%number% has no Items!"
    grave_items_header: "§aGrave #%number% has the following Items:"
    cannot_use_star: "§cYou can only use Player * with the remove Command."
    removed_all_graves_all: "§aRemoved all Graves of all Players."
    removed_all_graves_number: "§aRemoved all Graves with Number #%number%."
    no_grave_other: "§c%player% doesn't have a Grave with Number #%number%"
    teleported_to_grave: "§aTeleported to %player%'s Grave #%number%"
    failed_grave_location_other: "§cFailed to retrieve the grave location or world."
    no_graves_player: "§c%player% currently has no Graves."
    has_graves_header: "§a%player% has the following Graves:"
    player_not_found: "§cPlayer '%player%' not found."
    removed_all_graves_player: "§aRemoved all Graves of %player%."
    removed_grave_player: "§aRemoved %player%'s Grave #%number%"

  # ----- Update Notification Messages (JSON) -----
  # Each message includes the [SimpleGraves] prefix.
  update:
    available_json: '[{"text":"[","color":"red","bold":true},{"text":"Simple","color":"green","bold":true},{"text":"Graves","color":"blue","bold":true},{"text":"]","color":"red","bold":true},{"text":" ","color":"white"},{"text":"A new Update is available!","color":"gold"}]'
    click_download_json: '[{"text":"[","color":"red","bold":true},{"text":"Simple","color":"green","bold":true},{"text":"Graves","color":"blue","bold":true},{"text":"]","color":"red","bold":true},{"text":" ","color":"white"},{"text":"Click here to Download it!","color":"aqua","underlined":true,"clickEvent":{"action":"open_url","value":"https://modrinth.com/plugin/simple_graves/versions"}}]'
